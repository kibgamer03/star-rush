<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Star Rush — by Karimov</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --neon-cyan: #00f5ff;
    --neon-pink: #ff2d78;
    --neon-purple: #b400ff;
    --neon-gold: #ffd700;
    --bg-deep: #04020f;
    --card-bg: rgba(10, 5, 30, 0.85);
    --text-main: #e8e0ff;
  }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg-deep);
    font-family: 'Exo 2', sans-serif;
    color: var(--text-main);
    overflow: hidden;
    position: relative;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .starfield {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(100,0,200,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(0,150,255,0.12) 0%, transparent 55%),
      radial-gradient(ellipse at 60% 80%, rgba(255,0,120,0.1) 0%, transparent 50%),
      var(--bg-deep);
  }
  .starfield::before, .starfield::after {
    content: ''; position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.8), transparent),
      radial-gradient(1px 1px at 25% 45%, rgba(255,255,255,0.6), transparent),
      radial-gradient(1px 1px at 40% 10%, rgba(200,180,255,0.9), transparent),
      radial-gradient(1px 1px at 55% 70%, rgba(255,255,255,0.7), transparent),
      radial-gradient(1px 1px at 70% 30%, rgba(180,220,255,0.8), transparent),
      radial-gradient(1px 1px at 85% 60%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 5%  80%, rgba(255,255,255,0.7), transparent),
      radial-gradient(1px 1px at 90% 90%, rgba(200,180,255,0.6), transparent),
      radial-gradient(1.5px 1.5px at 33% 55%, rgba(255,255,255,0.9), transparent),
      radial-gradient(1px 1px at 75% 8%,  rgba(255,255,255,0.8), transparent),
      radial-gradient(1px 1px at 15% 35%, rgba(255,200,255,0.7), transparent),
      radial-gradient(1px 1px at 62% 20%, rgba(180,200,255,0.6), transparent),
      radial-gradient(1px 1px at 45% 85%, rgba(255,255,255,0.8), transparent),
      radial-gradient(1px 1px at 88% 45%, rgba(255,220,255,0.7), transparent);
  }
  .starfield::before { animation: twinkle 4s ease-in-out infinite alternate; }
  .starfield::after  { animation: twinkle 6s ease-in-out infinite alternate-reverse; }
  @keyframes twinkle { 0% { opacity:0.6; } 100% { opacity:1.0; } }

  .wrapper {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center;
    width: 100%; height: 100vh;
    padding: 8px;
    gap: 8px;
  }

  .title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(20px, 5vw, 42px);
    font-weight: 900; letter-spacing: 4px; text-transform: uppercase;
    background: linear-gradient(135deg, var(--neon-cyan) 0%, var(--neon-purple) 50%, var(--neon-pink) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 16px rgba(0,245,255,0.4));
    animation: titlePulse 3s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes titlePulse {
    0%,100% { filter: drop-shadow(0 0 16px rgba(0,245,255,0.4)); }
    50%      { filter: drop-shadow(0 0 32px rgba(180,0,255,0.6)); }
  }

  .hud {
    display: flex; gap: 8px; justify-content: center;
    width: 100%; flex-shrink: 0;
  }
  .hud-card {
    background: var(--card-bg);
    border: 1px solid rgba(0,245,255,0.2);
    border-radius: 10px;
    padding: 6px 12px;
    text-align: center;
    backdrop-filter: blur(8px);
    flex: 1; max-width: 90px;
    position: relative; overflow: hidden;
  }
  .hud-card::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(0,245,255,0.05), rgba(180,0,255,0.05));
  }
  .hud-label {
    font-size: 8px; letter-spacing: 2px; text-transform: uppercase;
    color: rgba(200,180,255,0.6);
  }
  .hud-value {
    font-family: 'Orbitron', monospace;
    font-size: clamp(16px, 4vw, 24px); font-weight: 700; line-height: 1.1;
    background: linear-gradient(180deg, var(--neon-cyan), rgba(0,180,255,0.7));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  #timer-val {
    background: linear-gradient(180deg, var(--neon-gold), rgba(255,150,0,0.7));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .canvas-wrap {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    flex: 1;
    width: 100%;
    max-width: 600px;
    box-shadow:
      0 0 0 1px rgba(0,245,255,0.15),
      0 0 30px rgba(0,245,255,0.08),
      0 0 60px rgba(180,0,255,0.06),
      inset 0 0 40px rgba(0,0,0,0.5);
  }
  .canvas-wrap::before {
    content: ''; position: absolute; inset: 0; z-index: 2; pointer-events: none;
    border-radius: 16px; border: 1px solid transparent;
    background: linear-gradient(135deg, rgba(0,245,255,0.2), rgba(180,0,255,0.1), rgba(255,45,120,0.15)) border-box;
    -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: destination-out; mask-composite: exclude;
  }
  canvas {
    display: block; width: 100%; height: 100%;
    background: radial-gradient(ellipse at 50% 30%, #0d0535 0%, #060220 50%, #030110 100%);
    touch-action: none;
  }

  /* ─── ripple on tap ─── */
  .tap-ripple {
    position: absolute; pointer-events: none; z-index: 4;
    border-radius: 50%;
    border: 2px solid rgba(0,245,255,0.7);
    animation: rippleAnim 0.5s ease forwards;
  }
  @keyframes rippleAnim {
    0%   { width:0; height:0; opacity:1; transform:translate(-50%,-50%) scale(1); }
    100% { width:60px; height:60px; opacity:0; transform:translate(-50%,-50%) scale(1); }
  }

  .overlay {
    position: absolute; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    background: radial-gradient(ellipse at center, rgba(10,5,40,0.97) 0%, rgba(3,1,16,0.99) 100%);
    border-radius: 16px;
    animation: fadeIn 0.4s ease;
    padding: 20px;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .overlay-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(16px, 4vw, 28px);
    font-weight: 900; letter-spacing: 3px; text-align: center;
  }
  .overlay-score {
    font-family: 'Orbitron', monospace;
    font-size: clamp(36px, 10vw, 64px); font-weight: 900;
    background: linear-gradient(135deg, var(--neon-gold) 0%, var(--neon-pink) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 24px rgba(255,215,0,0.4));
  }
  .overlay-sub {
    font-size: clamp(11px, 2.5vw, 14px); letter-spacing: 1px;
    color: rgba(200,180,255,0.6); text-align: center; line-height: 1.7;
  }

  .instructions {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px;
    width: 100%; max-width: 280px;
  }
  .inst-item {
    display: flex; align-items: center; gap: 8px;
    font-size: clamp(11px, 2.5vw, 13px); color: rgba(200,180,255,0.6);
  }
  .inst-badge { font-size: 20px; }

  .btn {
    font-family: 'Orbitron', monospace;
    font-size: clamp(12px, 3vw, 14px); font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase;
    padding: 14px 36px;
    border: none; border-radius: 50px; cursor: pointer;
    background: linear-gradient(135deg, var(--neon-cyan) 0%, var(--neon-purple) 100%);
    color: #04020f;
    position: relative; overflow: hidden;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 0 20px rgba(0,245,255,0.3), 0 0 40px rgba(180,0,255,0.15);
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.94); }

  .combo-popup {
    position: absolute; pointer-events: none; z-index: 5;
    font-family: 'Orbitron', monospace;
    font-size: clamp(16px, 4vw, 22px); font-weight: 900;
    color: var(--neon-gold);
    text-shadow: 0 0 20px var(--neon-gold);
    animation: comboAnim 0.9s ease forwards;
    white-space: nowrap;
  }
  @keyframes comboAnim {
    0%   { opacity:1; transform:translateY(0) scale(1); }
    50%  { opacity:1; transform:translateY(-30px) scale(1.3); }
    100% { opacity:0; transform:translateY(-70px) scale(0.8); }
  }

  .footer {
    font-family: 'Orbitron', monospace;
    font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
    color: rgba(0,245,255,0.35); flex-shrink: 0;
    padding-bottom: 4px;
    animation: footerGlow 4s ease-in-out infinite;
  }
  @keyframes footerGlow {
    0%,100% { color: rgba(0,245,255,0.35); }
    50%      { color: rgba(180,0,255,0.55); }
  }
</style>
</head>
<body>
<div class="starfield"></div>
<div class="wrapper">
  <div class="title">Star Rush</div>

  <div class="hud">
    <div class="hud-card">
      <div class="hud-label">Score</div>
      <div class="hud-value" id="score-val">0</div>
    </div>
    <div class="hud-card">
      <div class="hud-label">Best</div>
      <div class="hud-value" id="best-val">0</div>
    </div>
    <div class="hud-card">
      <div class="hud-label">Time</div>
      <div class="hud-value" id="timer-val">30</div>
    </div>
    <div class="hud-card">
      <div class="hud-label">Combo</div>
      <div class="hud-value" id="combo-val">x1</div>
    </div>
  </div>

  <div class="canvas-wrap" id="canvas-wrap">
    <canvas id="game"></canvas>

    <div class="overlay" id="start-screen">
      <div class="overlay-title" style="background:linear-gradient(135deg,var(--neon-cyan),var(--neon-pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;">
        ✦ Star Rush ✦
      </div>
      <div class="instructions">
        <div class="inst-item"><div class="inst-badge">⭐</div><span>+1 очко</span></div>
        <div class="inst-item"><div class="inst-badge">💎</div><span>+5 очков</span></div>
        <div class="inst-item"><div class="inst-badge">🌀</div><span>+3 секунды</span></div>
        <div class="inst-item"><div class="inst-badge">💀</div><span>−5 очков</span></div>
        <div class="inst-item"><div class="inst-badge">☄️</div><span>+3 очка</span></div>
        <div class="inst-item"><div class="inst-badge">🔥</div><span>Комбо×8</span></div>
      </div>
      <div class="overlay-sub">Нажимай на объекты — собирай комбо!</div>
      <button class="btn" onclick="startGame()">Начать игру</button>
    </div>

    <div class="overlay" id="over-screen" style="display:none;">
      <div class="overlay-title" style="color:var(--neon-pink);text-shadow:0 0 30px rgba(255,45,120,0.5);">
        Игра окончена
      </div>
      <div class="overlay-score" id="final-score">0</div>
      <div class="overlay-sub" id="over-msg">—</div>
      <button class="btn" onclick="startGame()">Играть снова</button>
    </div>
  </div>

  <div class="footer">Made by Karimov</div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvas-wrap');

// ─── responsive canvas sizing ───
let W, H;
function resizeCanvas() {
  const rect = wrap.getBoundingClientRect();
  W = rect.width; H = rect.height;
  canvas.width  = Math.round(W * devicePixelRatio);
  canvas.height = Math.round(H * devicePixelRatio);
  ctx.scale(devicePixelRatio, devicePixelRatio);
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); bgStars = makeBgStars(); });

// detect touch
const isMobile = 'ontouchstart' in window;
if(!isMobile) {
  document.body.style.cursor = 'none';
  // custom cursor only on desktop
  const cur = document.createElement('div');
  cur.id = 'cursor-dot';
  cur.style.cssText = 'position:fixed;pointer-events:none;z-index:999;width:12px;height:12px;border-radius:50%;background:rgba(0,245,255,0.8);margin:-6px 0 0 -6px;transition:transform 0.08s;box-shadow:0 0 12px rgba(0,245,255,0.6)';
  document.body.appendChild(cur);
  document.addEventListener('mousemove', e => { cur.style.left=e.clientX+'px'; cur.style.top=e.clientY+'px'; });
}

let score = 0, best = parseInt(localStorage.getItem('starRushBest') || '0');
let timeLeft = 30, combo = 1, comboTimer = 0;
let running = false, animId = null;
let objects = [], particles = [];
let mx = -999, my = -999;
let lastTime = 0, spawnTimer = 0;
let bgStars = [];

function makeBgStars() {
  const arr = [];
  for(let i = 0; i < 100; i++) arr.push({
    x: Math.random() * W, y: Math.random() * H,
    r: Math.random() * 1.4 + 0.3,
    speed: Math.random() * 0.4 + 0.1,
    phase: Math.random() * Math.PI * 2
  });
  return arr;
}
bgStars = makeBgStars();

const TYPES = [
  { kind:'star',   emoji:'⭐', pts:1,  time:0, color:'#ffd700', r:22, weight:50 },
  { kind:'gem',    emoji:'💎', pts:5,  time:0, color:'#00f5ff', r:20, weight:14 },
  { kind:'clock',  emoji:'🌀', pts:0,  time:3, color:'#b400ff', r:22, weight:12 },
  { kind:'bomb',   emoji:'💀', pts:-5, time:0, color:'#ff2d78', r:22, weight:10 },
  { kind:'meteor', emoji:'☄️', pts:3,  time:0, color:'#ff8c00', r:18, weight:14 },
];
function weightedType() {
  const total = TYPES.reduce((s,t)=>s+t.weight,0); let r=Math.random()*total;
  for(const t of TYPES) { r-=t.weight; if(r<=0) return t; } return TYPES[0];
}

function spawnObject() {
  const type = weightedType();
  const m = 55;
  const x = m + Math.random()*(W-m*2), y = m + Math.random()*(H-m*2);
  const life = 2.0 + Math.random() * 1.0;
  objects.push({...type, x, y, life, maxLife:life, scale:0, rotation:Math.random()*Math.PI*2, rotSpeed:(Math.random()-0.5)*0.06});
}

function spawnParticle(x,y,color,count=12) {
  for(let i=0;i<count;i++) {
    const angle=(i/count)*Math.PI*2+Math.random()*0.5, speed=1.5+Math.random()*3;
    particles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,r:2+Math.random()*3,color,life:1,maxLife:0.5+Math.random()*0.4});
  }
}

function spawnComboText(x,y,text) {
  const div = document.createElement('div');
  div.className = 'combo-popup'; div.textContent = text;
  div.style.left = (x * wrap.clientWidth / W - 40) + 'px';
  div.style.top  = (y * wrap.clientHeight / H - 20) + 'px';
  wrap.appendChild(div);
  setTimeout(() => div.remove(), 900);
}

function spawnRipple(px, py) {
  const div = document.createElement('div');
  div.className = 'tap-ripple';
  div.style.left = px + 'px'; div.style.top = py + 'px';
  wrap.appendChild(div);
  setTimeout(() => div.remove(), 500);
}

function updateHUD() {
  document.getElementById('score-val').textContent = score;
  document.getElementById('best-val').textContent  = best;
  document.getElementById('timer-val').textContent = Math.ceil(timeLeft);
  document.getElementById('combo-val').textContent = 'x'+combo;
  const tv = document.getElementById('timer-val');
  if(timeLeft<=5) tv.style.animation='titlePulse 0.5s ease-in-out infinite';
  else tv.style.animation='';
}

function handleTap(cx, cy, visualX, visualY) {
  if(!running) return;
  spawnRipple(visualX, visualY);
  let hit = false;
  for(let i=objects.length-1;i>=0;i--) {
    const o=objects[i];
    const dist=Math.hypot(cx-o.x, cy-o.y);
    const hitRadius = o.r + (isMobile ? 16 : 10);
    if(dist < hitRadius) {
      hit=true;
      spawnParticle(o.x,o.y,o.color,o.kind==='bomb'?20:12);
      if(o.kind==='bomb') {
        score=Math.max(0,score-5); combo=1; comboTimer=0;
        spawnComboText(o.x,o.y,'-5 💀');
        wrap.style.boxShadow='0 0 60px rgba(255,45,120,0.7)';
        setTimeout(()=>{ wrap.style.boxShadow=''; },300);
      } else {
        const gained=o.pts*combo; score+=gained;
        if(score>best){best=score;localStorage.setItem('starRushBest',best);}
        timeLeft+=o.time; comboTimer=2.5; combo=Math.min(combo+1,8);
        if(combo>=3) spawnComboText(o.x,o.y,(gained>0?'+'+gained:'')+' x'+combo+'!');
        else if(gained>0) spawnComboText(o.x,o.y,'+'+gained);
        if(o.time>0) spawnComboText(o.x,o.y-36,'+'+o.time+'s ⏰');
      }
      objects.splice(i,1); break;
    }
  }
  if(!hit){combo=Math.max(1,combo-1);comboTimer=0;}
  updateHUD();
}

// Mouse
canvas.addEventListener('click', e => {
  if(isMobile) return;
  const rect=canvas.getBoundingClientRect();
  const cx=(e.clientX-rect.left)*(W/rect.width);
  const cy=(e.clientY-rect.top)*(H/rect.height);
  handleTap(cx,cy,e.clientX-rect.left,e.clientY-rect.top);
});
document.addEventListener('mousemove', e => {
  const rect=canvas.getBoundingClientRect();
  mx=(e.clientX-rect.left)*(W/rect.width);
  my=(e.clientY-rect.top)*(H/rect.height);
});

// Touch
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  for(const t of e.changedTouches) {
    const cx=(t.clientX-rect.left)*(W/rect.width);
    const cy=(t.clientY-rect.top)*(H/rect.height);
    handleTap(cx,cy,t.clientX-rect.left,t.clientY-rect.top);
  }
}, {passive:false});

function drawObject(o) {
  ctx.save();
  ctx.translate(o.x,o.y); ctx.rotate(o.rotation); ctx.scale(o.scale,o.scale);
  const t=o.life/o.maxLife;
  const alpha=t<0.2?t/0.2:t>0.8?(t-0.8)/0.2:1;
  ctx.globalAlpha=alpha*0.9;
  const grd=ctx.createRadialGradient(0,0,0,0,0,o.r*1.8);
  grd.addColorStop(0,o.color+'40'); grd.addColorStop(1,'transparent');
  ctx.fillStyle=grd;
  ctx.beginPath(); ctx.arc(0,0,o.r*1.8,0,Math.PI*2); ctx.fill();
  ctx.font=`${o.r*1.5}px serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(o.emoji,0,0);
  ctx.restore();
}

function drawParticles() {
  for(const p of particles) {
    ctx.globalAlpha=p.life;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.color; ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawBgStars(t) {
  for(const s of bgStars) {
    const a=0.3+0.4*Math.sin(t*s.speed+s.phase);
    ctx.globalAlpha=a; ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawCursor() {
  if(isMobile || mx<0) return;
  ctx.save();
  ctx.strokeStyle='rgba(0,245,255,0.25)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(mx,my,30,0,Math.PI*2); ctx.stroke();
  ctx.strokeStyle='rgba(0,245,255,0.4)'; ctx.setLineDash([4,8]);
  ctx.beginPath(); ctx.arc(mx,my,20,0,Math.PI*2); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();
}

function loop(ts) {
  const dt=Math.min((ts-lastTime)/1000,0.05); lastTime=ts;
  if(!running) return;
  timeLeft-=dt;
  if(timeLeft<=0){timeLeft=0;endGame();return;}
  comboTimer-=dt;
  if(comboTimer<=0&&combo>1){combo=Math.max(1,combo-1);comboTimer=1.5;}
  spawnTimer-=dt;
  if(spawnTimer<=0) {
    spawnObject();
    spawnTimer=0.5*(1+Math.max(0,timeLeft-10)*0.02);
  }
  for(let i=objects.length-1;i>=0;i--) {
    const o=objects[i]; o.life-=dt; o.rotation+=o.rotSpeed;
    o.scale=o.scale<1?Math.min(1,o.scale+dt*4):1;
    if(o.life<=0)objects.splice(i,1);
  }
  for(let i=particles.length-1;i>=0;i--) {
    const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.08;
    p.life-=dt/p.maxLife; if(p.life<=0)particles.splice(i,1);
  }
  ctx.clearRect(0,0,W,H);
  drawBgStars(ts/1000); drawParticles();
  for(const o of objects) drawObject(o);
  drawCursor();
  updateHUD();
  animId=requestAnimationFrame(loop);
}

function startGame() {
  document.getElementById('start-screen').style.display='none';
  document.getElementById('over-screen').style.display='none';
  score=0;timeLeft=30;combo=1;comboTimer=0;objects=[];particles=[];spawnTimer=0;
  running=true; lastTime=performance.now(); updateHUD();
  if(animId)cancelAnimationFrame(animId);
  animId=requestAnimationFrame(loop);
}

function endGame() {
  running=false; if(animId)cancelAnimationFrame(animId);
  if(score>best){best=score;localStorage.setItem('starRushBest',best);}
  updateHUD();
  document.getElementById('final-score').textContent=score;
  const msg=score>=80?'🏆 Легенда! Невероятный результат!':
            score>=50?'🌟 Отлично! Ты настоящий охотник звёзд!':
            score>=25?'✨ Хорошо! Ещё немного практики — и рекорд твой!':
            '🚀 Начало пути. Попробуй ещё раз!';
  document.getElementById('over-msg').textContent=msg;
  document.getElementById('over-screen').style.display='flex';
}

updateHUD();
(function idleDraw(t) {
  if(running)return;
  ctx.clearRect(0,0,W,H); drawBgStars(t/1000);
  requestAnimationFrame(idleDraw);
})(performance.now());
</script>
</body>
</html>
